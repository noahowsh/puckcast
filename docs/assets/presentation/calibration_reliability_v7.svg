<svg width="520" height="300" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <style>.bg{fill:#0f1f2f;stroke:#4ec0f0;stroke-width:2;rx:14;ry:14;}.title{fill:#e6f4ff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:16px;font-weight:700;}.axis{stroke:#b8d4f5;stroke-width:1;}.label{fill:#b8d4f5;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;}.diag{stroke:#4ec0f0;stroke-dasharray:4 4;stroke-width:2;}.bar{fill:#8de0a3;opacity:0.8;}</style>
  <rect class="bg" x="20" y="20" width="480" height="260" />
