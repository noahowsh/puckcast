<svg width="520" height="300" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <style>.bg{fill:#0f1f2f;stroke:#4ec0f0;stroke-width:2;rx:14;ry:14;}.title{fill:#e6f4ff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:16px;font-weight:700;}.axis{stroke:#b8d4f5;stroke-width:1;}.label{fill:#b8d4f5;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;}.win{fill:#8de0a3;opacity:0.8;}.loss{fill:#e0a38d;opacity:0.7;}</style>
  <rect class="bg" x="20" y="20" width="480" height="260" />
  <text class="title" x="260" y="55" text-anchor="middle">Edge vs Outcome (sample)</text>
  <line class="axis" x1="80" y1="230" x2="440" y2="230" />
  <line class="axis" x1="80" y1="110" x2="80" y2="230" />
  <text class="label" x="260" y="255" text-anchor="middle">Edge (%)</text>
  <text class="label" transform="rotate(-90 55 170)" x="55" y="170" text-anchor="middle">Outcome</text>
  <circle class="win" cx="130" cy="210" r="8" />
  <circle class="win" cx="200" cy="190" r="8" />
  <circle class="win" cx="270" cy="170" r="8" />
  <circle class="win" cx="340" cy="150" r="8" />
  <circle class="win" cx="410" cy="130" r="8" />
  <circle class="loss" cx="170" cy="220" r="8" />
  <circle class="loss" cx="240" cy="205" r="8" />
  <circle class="loss" cx="310" cy="190" r="8" />
  <circle class="loss" cx="380" cy="175" r="8" />
</svg>
