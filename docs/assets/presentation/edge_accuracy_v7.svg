<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#0f1f2f; stroke:#4ec0f0; stroke-width:2; rx:14; ry:14; }
    .title { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:16px; font-weight:700; }
    .label { fill:#b8d4f5; font-family:'Helvetica Neue', Arial, sans-serif; font-size:13px; }
    .barbg { fill:#142a4a; }
    .bar { fill:#8de0a3; }
    .note { fill:#9fb9d9; font-family:'Helvetica Neue', Arial, sans-serif; font-size:12px; }
  </style>
  <rect class="bg" x="20" y="20" width="680" height="320" />
  <text class="title" x="360" y="55" text-anchor="middle">Accuracy by Edge Band (v7.0)</text>
  <g transform="translate(80,90)">
    <rect class="barbg" x="0" y="0" width="560" height="18" rx="4" />
    <rect class="bar" x="0" y="0" width="444" height="18" rx="4" />
    <text class="label" x="0" y="-6">A+ (≥25 pts) — 79.3% (n=333)</text>
  </g>
  <g transform="translate(80,130)">
    <rect class="barbg" x="0" y="0" width="560" height="18" rx="4" />
    <rect class="bar" x="0" y="0" width="404" height="18" rx="4" />
    <text class="label" x="0" y="-6">A (20–25 pts) — 72.0% (n=404)</text>
  </g>
  <g transform="translate(80,170)">
    <rect class="barbg" x="0" y="0" width="560" height="18" rx="4" />
    <rect class="bar" x="0" y="0" width="377" height="18" rx="4" />
    <text class="label" x="0" y="-6">B+ (15–20 pts) — 67.3% (n=687)</text>
  </g>
  <g transform="translate(80,210)">
    <rect class="barbg" x="0" y="0" width="560" height="18" rx="4" />
    <rect class="bar" x="0" y="0" width="347" height="18" rx="4" />
    <text class="label" x="0" y="-6">B (10–15 pts) — 61.9% (n=975)</text>
  </g>
  <g transform="translate(80,250)">
    <rect class="barbg" x="0" y="0" width="560" height="18" rx="4" />
    <rect class="bar" x="0" y="0" width="324" height="18" rx="4" />
    <text class="label" x="0" y="-6">C+ (5–10 pts) — 57.8% (n=1231)</text>
  </g>
  <g transform="translate(80,290)">
    <rect class="barbg" x="0" y="0" width="560" height="18" rx="4" />
    <rect class="bar" x="0" y="0" width="291" height="18" rx="4" />
    <text class="label" x="0" y="-6">C (0–5 pts) — 51.9% (n=1372)</text>
  </g>
  <text class="note" x="360" y="335" text-anchor="middle">Edge = distance from 50/50; higher edge → higher confidence.</text>
</svg>
