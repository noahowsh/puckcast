<svg width="520" height="360" viewBox="0 0 520 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#0f1f2f; stroke:#4ec0f0; stroke-width:2; rx:14; ry:14; }
    .title { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:16px; font-weight:700; }
    .axis { fill:#b8d4f5; font-family:'Helvetica Neue', Arial, sans-serif; font-size:13px; }
    .cell { stroke:#0f1f2f; stroke-width:2; }
    .cell-text { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:16px; font-weight:700; }
    .cell-sub { fill:#b8d4f5; font-family:'Helvetica Neue', Arial, sans-serif; font-size:12px; }
  </style>
  <rect class="bg" x="20" y="20" width="480" height="320" />
  <text class="title" x="260" y="55" text-anchor="middle">Confusion Matrix (v7.0)</text>
  <text class="axis" x="150" y="100" text-anchor="middle">Actual</text>
  <text class="axis" x="420" y="320" text-anchor="middle">Predicted</text>

  <!-- Cells -->
  <rect class="cell" x="120" y="120" width="140" height="100" fill="#1c3b5c" />
  <text class="cell-text" x="190" y="170" text-anchor="middle">1650</text>
  <text class="cell-sub" x="190" y="190" text-anchor="middle">(65.1%)</text>

  <rect class="cell" x="280" y="120" width="140" height="100" fill="#244b77" />
  <text class="cell-text" x="350" y="170" text-anchor="middle">880</text>
  <text class="cell-sub" x="350" y="190" text-anchor="middle">(34.9%)</text>

  <rect class="cell" x="120" y="240" width="140" height="100" fill="#274f7f" />
  <text class="cell-text" x="190" y="290" text-anchor="middle">630</text>
  <text class="cell-sub" x="190" y="310" text-anchor="middle">(27.7%)</text>

  <rect class="cell" x="280" y="240" width="140" height="100" fill="#8de0a3" />
  <text class="cell-text" x="350" y="290" text-anchor="middle">1642</text>
  <text class="cell-sub" x="350" y="310" text-anchor="middle">(72.3%)</text>

  <text class="axis" x="190" y="110" text-anchor="middle">Home</text>
  <text class="axis" x="350" y="110" text-anchor="middle">Away</text>
  <text class="axis" transform="rotate(-90 105 200)" x="105" y="200" text-anchor="middle">Home</text>
  <text class="axis" transform="rotate(-90 105 270)" x="105" y="270" text-anchor="middle">Away</text>
</svg>
