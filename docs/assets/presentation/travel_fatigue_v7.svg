<svg width="520" height="300" viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg">
  <style>.bg{fill:#0f1f2f;stroke:#4ec0f0;stroke-width:2;rx:14;ry:14;}.title{fill:#e6f4ff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:16px;font-weight:700;}.barbg{fill:#142a4a;}.bar{fill:#8de0a3;}.label{fill:#b8d4f5;font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;}</style>
  <rect class="bg" x="20" y="20" width="480" height="260" />
  <text class="title" x="260" y="55" text-anchor="middle">Travel / Fatigue</text>
  <rect class="barbg" x="80" y="100" width="360" height="18" rx="4" />
  <rect class="bar" x="80" y="100" width="260" height="18" rx="4" />
  <text class="label" x="80" y="90">Recent travel distance</text>
  <rect class="barbg" x="80" y="160" width="360" height="18" rx="4" />
  <rect class="bar" x="80" y="160" width="240" height="18" rx="4" />
  <text class="label" x="80" y="150">Fatigue index</text>
</svg>
