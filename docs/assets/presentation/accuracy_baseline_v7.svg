<svg width="560" height="280" viewBox="0 0 560 280" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#0f1f2f; stroke:#4ec0f0; stroke-width:2; rx:14; ry:14; }
    .title { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:18px; font-weight:700; }
    .barbg { fill:#142a4a; }
    .bar-base { fill:#e0c68d; }
    .bar-model { fill:#8de0a3; }
    .label { fill:#b8d4f5; font-family:'Helvetica Neue', Arial, sans-serif; font-size:14px; }
    .value { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:16px; font-weight:700; }
  </style>
  <rect class="bg" x="20" y="20" width="520" height="240" />
  <text class="title" x="280" y="60" text-anchor="middle">Accuracy vs Baseline (5,002 games)</text>

  <rect class="barbg" x="80" y="110" width="400" height="28" rx="6" />
  <rect class="bar-base" x="80" y="110" width="216" height="28" rx="6" />
  <text class="label" x="80" y="102">Baseline: 53.9% (home win rate)</text>
  <text class="value" x="500" y="130" text-anchor="end">53.9%</text>

  <rect class="barbg" x="80" y="170" width="400" height="28" rx="6" />
  <rect class="bar-model" x="80" y="170" width="244" height="28" rx="6" />
  <text class="label" x="80" y="162">Model: 60.9% (calibrated)</text>
  <text class="value" x="500" y="190" text-anchor="end">60.9%</text>
</svg>
