<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#0f1f2f; stroke:#4ec0f0; stroke-width:2; rx:14; ry:14; }
    .title { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:16px; font-weight:700; }
    .axis { stroke:#b8d4f5; stroke-width:1; }
    .label { fill:#b8d4f5; font-family:'Helvetica Neue', Arial, sans-serif; font-size:13px; }
    .point { fill:#8de0a3; opacity:0.7; }
  </style>
  <rect class="bg" x="20" y="20" width="680" height="320" />
  <text class="title" x="360" y="55" text-anchor="middle">Accuracy vs Confidence (buckets)</text>
  <line class="axis" x1="80" y1="280" x2="620" y2="280" />
  <line class="axis" x1="80" y1="120" x2="80" y2="280" />
  <text class="label" x="350" y="305" text-anchor="middle">Confidence grade (edge band)</text>
  <text class="label" transform="rotate(-90 50 190)" x="50" y="190" text-anchor="middle">Accuracy (%)</text>
  <circle class="point" cx="120" cy="240" r="10" />
  <text class="label" x="120" y="320" text-anchor="middle">C</text>
  <circle class="point" cx="200" cy="225" r="10" />
  <text class="label" x="200" y="320" text-anchor="middle">C+</text>
  <circle class="point" cx="280" cy="200" r="10" />
  <text class="label" x="280" y="320" text-anchor="middle">B</text>
  <circle class="point" cx="360" cy="180" r="10" />
  <text class="label" x="360" y="320" text-anchor="middle">B+</text>
  <circle class="point" cx="440" cy="150" r="10" />
  <text class="label" x="440" y="320" text-anchor="middle">A</text>
  <circle class="point" cx="520" cy="120" r="10" />
  <text class="label" x="520" y="320" text-anchor="middle">A+</text>
</svg>
