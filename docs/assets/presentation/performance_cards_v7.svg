<svg width="720" height="220" viewBox="0 0 720 220" xmlns="http://www.w3.org/2000/svg">
  <style>.card{fill:#0f1f2f;stroke:#4ec0f0;stroke-width:2;rx:12;ry:12;}.title{fill:#e6f4ff;font-family:'Helvetica Neue',Arial,sans-serif;font-size:16px;font-weight:700;}.value{fill:#8de0a3;font-family:'Helvetica Neue',Arial,sans-serif;font-size:28px;font-weight:800;}.label{fill:#b8d4f5;font-family:'Helvetica Neue',Arial,sans-serif;font-size:14px;}</style>
  <rect class="card" x="20" y="20" width="220" height="180" />
  <text class="title" x="130" y="60" text-anchor="middle">Accuracy</text>
  <text class="value" x="130" y="110" text-anchor="middle">60.9%</text>
  <text class="label" x="130" y="140" text-anchor="middle">(5,002 games)</text>
  <rect class="card" x="250" y="20" width="220" height="180" />
  <text class="title" x="360" y="60" text-anchor="middle">Log loss</text>
  <text class="value" x="360" y="110" text-anchor="middle">0.655</text>
  <text class="label" x="360" y="140" text-anchor="middle">Calibrated</text>
  <rect class="card" x="480" y="20" width="220" height="180" />
  <text class="title" x="590" y="60" text-anchor="middle">A+ win rate</text>
  <text class="value" x="590" y="110" text-anchor="middle">79.3%</text>
  <text class="label" x="590" y="140" text-anchor="middle">(≥25 pts edges)</text>
</svg>
