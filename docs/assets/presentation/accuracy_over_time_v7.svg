<svg width="720" height="360" viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill:#0f1f2f; stroke:#4ec0f0; stroke-width:2; rx:14; ry:14; }
    .title { fill:#e6f4ff; font-family:'Helvetica Neue', Arial, sans-serif; font-size:16px; font-weight:700; }
    .axis { stroke:#b8d4f5; stroke-width:1; }
    .label { fill:#b8d4f5; font-family:'Helvetica Neue', Arial, sans-serif; font-size:13px; }
    .line { stroke:#8de0a3; stroke-width:3; fill:none; }
  </style>
  <rect class="bg" x="20" y="20" width="680" height="320" />
  <text class="title" x="360" y="55" text-anchor="middle">Accuracy Over Time (rolling)</text>
  <line class="axis" x1="80" y1="280" x2="620" y2="280" />
  <line class="axis" x1="80" y1="100" x2="80" y2="280" />
  <text class="label" x="360" y="305" text-anchor="middle">Time (games)</text>
  <text class="label" transform="rotate(-90 50 190)" x="50" y="190" text-anchor="middle">Accuracy (%)</text>
  <path class="line" d="M 80 250 L 150 240 L 220 235 L 290 228 L 360 225 L 430 220 L 500 218 L 570 216 L 620 215" />
  <text class="label" x="620" y="210" text-anchor="end">~60-61%</text>
</svg>
