name: Nightly data refresh

on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC (6 AM ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run refresh pipeline
        run: python scripts/refresh_site_data.py
      - name: Commit updated JSON artifacts
        run: |
          git status -sb
          if git diff --quiet -- web/src/data/todaysPredictions.json web/src/data/currentStandings.json; then
            echo "No JSON changes, skipping commit"
          else
            git config user.name "puckcast-bot"
            git config user.email "bot@puckcast.ai"
            git add web/src/data/todaysPredictions.json web/src/data/currentStandings.json
            git commit -m "chore: nightly data refresh [skip ci]"
            git push
          fi
