name: Nightly data refresh

on:
  schedule:
    - cron: "0 11 * * *" # 11:00 UTC (6 AM ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ALERT_EMAIL_USERNAME: ${{ secrets.ALERT_EMAIL_USERNAME }}
      ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run refresh pipeline
        run: python scripts/refresh_site_data.py
      - name: Commit updated JSON artifacts
        if: success()
        run: |
          git status -sb
          if git diff --quiet -- web/src/data/todaysPredictions.json web/src/data/currentStandings.json web/src/data/goaliePulse.json; then
            echo "No JSON changes, skipping commit"
          else
            git config user.name "puckcast-bot"
            git config user.email "bot@puckcast.ai"
            git add web/src/data/todaysPredictions.json web/src/data/currentStandings.json web/src/data/goaliePulse.json
            git commit -m "chore: nightly data refresh [skip ci]"
            git push
          fi
      - name: Send failure alert
        if: failure() && env.ALERT_EMAIL_USERNAME != '' && env.ALERT_EMAIL_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.ALERT_EMAIL_USERNAME }}
          password: ${{ env.ALERT_EMAIL_PASSWORD }}
          subject: "[Puckcast] Nightly data refresh FAILED"
          to: noahowsh@gmail.com
          from: ${{ secrets.ALERT_EMAIL_USERNAME }}
          body: |
            The nightly refresh workflow failed on run ${{ github.run_id }}.
            View logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
